spring:
  application:
    name: vmetrix-query-manager-poc

  datasource:
    url: jdbc:h2:mem:vmetrixdb;MODE=Oracle;DATABASE_TO_UPPER=true
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

  jackson:
    default-property-inclusion: non_null

logging:
  level:
    root: INFO
    com.vmetrix.querymanager: DEBUG
    org.springframework.jdbc.datasource.init: DEBUG

server:
  port: 8080

metadata:
  entities-path: metadata/entities
  relationships-path: metadata/relationships.json
  comparators-path: metadata/comparators.json