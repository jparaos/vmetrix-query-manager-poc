spring:
  application:
    name: vmetrix-query-manager-poc

  datasource:
    url: jdbc:h2:mem:vmetrixdb;MODE=Oracle;DATABASE_TO_UPPER=true
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

  jackson:
    default-property-inclusion: non_null

logging:
  level:
    root: INFO
    com.vmetrix.querymanager: DEBUG

server:
  port: 8080